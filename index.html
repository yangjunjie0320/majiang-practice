<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>川麻练习</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🀄</text></svg>">
<style>
  /* 牌桌：深绒绿桌面；牌张与账单是桌上唯一的"实物"（骨白），
     可点的控件共用骨牌质感，主操作与判定沿用牌面墨色（朱砂/松青） */
  :root {
    --felt-deep: #142e24; --felt: #1e4433; --felt-hi: #2a5c46;
    --bone: #f7f2e4; --bone-edge: #d8cdb2; --bone-shadow: #b9ad8e;
    --ink: #2b2118; --ink-soft: #6b5a43;
    --red: #b3261e; --pine: #1e6b43; --brass: #d9a441;
    --text: #e9efe7; --muted: #b9ccbf;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         max-width: 720px; margin: 0 auto; padding: 20px 16px 56px; color: var(--text);
         min-height: 100vh; background-color: var(--felt-deep);
         background-image: radial-gradient(1100px 700px at 50% -120px,
           var(--felt-hi), var(--felt) 55%, var(--felt-deep)); background-attachment: fixed; }
  h1 { font-family: "Songti SC", "STSong", "SimSun", "Noto Serif SC", serif;
       font-size: 1.7em; font-weight: 900; letter-spacing: .14em; color: var(--bone);
       margin: 4px 0 18px; display: flex; align-items: center; gap: 12px; }
  .seal { font-size: .5em; font-weight: 700; letter-spacing: 0; line-height: 1;
          background: var(--red); color: var(--bone); padding: 5px 6px;
          border-radius: 4px; transform: rotate(-4deg);
          box-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .tabs { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tabs button { font-family: inherit; font-size: 1em; padding: 8px 18px; cursor: pointer;
                 border: 1px solid rgba(247,242,228,.4); background: transparent;
                 color: var(--bone); border-radius: 8px; transition: background .15s; }
  .tabs button:hover { background: rgba(247,242,228,.12); }
  .tabs button.active { background: linear-gradient(#fffef9, #efe8d3);
                        color: var(--red); font-weight: 700; border-color: var(--bone-edge);
                        box-shadow: 0 2px 0 var(--bone-shadow), 0 3px 6px rgba(0,0,0,.35); }
  .tabs.diff { margin-top: 10px; }
  .tabs.diff button { font-size: .85em; padding: 4px 14px; border-radius: 999px; }
  .tabs.diff .hint { margin: 0; }
  .tile-row { margin: 3px 0; }
  .hint { color: var(--muted); margin: 14px 0 6px; font-size: .95em; }
  .hint b { color: var(--bone); }
  .tile { display: inline-flex; justify-content: center; align-items: center;
          width: 46px; height: 62px; padding: 0;
          margin: 2px; border: 1px solid var(--bone-edge); border-radius: 7px;
          background: linear-gradient(#fffef9, #f1ecdd);
          box-shadow: 0 2px 0 var(--bone-shadow), 0 3px 5px rgba(0,0,0,.35);
          user-select: none; }
  .tile .face { width: 90%; height: 90%; object-fit: contain; pointer-events: none; }
  button.tile { cursor: pointer; transition: transform .08s; }
  button.tile:hover { transform: translateY(-2px); }
  .tile.selected { outline: 3px solid var(--brass); }
  .tile.good { background: #d9efdc; border-color: #27ae60; outline: 3px solid var(--pine); }
  .tile.bad { background: #f8dbd6; border-color: #c0392b; outline: 3px solid var(--red); }
  .tile.missed { background: #fcf3cf; border-color: #b7950b; outline: 3px solid var(--brass); }
  .actions { display: flex; gap: 10px; margin: 18px 0; }
  .actions button { font-family: inherit; font-size: 1em; padding: 9px 26px; cursor: pointer;
                    border-radius: 8px; border: 1px solid var(--bone-edge);
                    background: linear-gradient(#fffef9, #efe8d3); color: var(--red);
                    font-weight: 700;
                    box-shadow: 0 2px 0 var(--bone-shadow), 0 3px 6px rgba(0,0,0,.3); }
  .actions button:disabled { opacity: .35; box-shadow: none; cursor: default; }
  .actions #next { background: transparent; color: var(--bone); font-weight: 400;
                   border-color: rgba(247,242,228,.4); box-shadow: none; }
  #verdict { font-weight: bold; font-size: 1.15em; margin: 12px 0; }
  #verdict.ok { color: #8fe0ac; } #verdict.no { color: #ffa392; }
  table { border-collapse: separate; border-spacing: 0; margin-top: 12px;
          font-size: .95em; font-variant-numeric: tabular-nums; }
  th, td { padding: 7px 14px; text-align: left; border-bottom: 1px solid #e2d7bd; }
  th { color: var(--ink-soft); font-weight: 600; font-size: .85em; letter-spacing: .05em; }
  tr:last-child td { border-bottom: none; }
  tr.best { background: #e7f2e6; }
  #result table { background: var(--bone); color: var(--ink); border-radius: 10px;
                  overflow: hidden;
                  box-shadow: 0 2px 0 var(--bone-shadow), 0 4px 10px rgba(0,0,0,.3); }
  #result .hint { font-size: .85em; }
  /* 结账：一张纸账单 */
  #settle { background: var(--bone); color: var(--ink); border-radius: 12px;
            padding: 18px 22px; margin-top: 16px; max-width: 560px;
            box-shadow: 0 2px 0 var(--bone-shadow), 0 6px 14px rgba(0,0,0,.35); }
  #settle .hint { color: var(--ink-soft); }
  .s-row { display: flex; align-items: center; margin: 6px 0; }
  .s-row label { width: 5.5em; color: var(--ink-soft); font-size: .95em; }
  #settle input { font: inherit; font-variant-numeric: tabular-nums; width: 110px;
                  padding: 5px 8px; margin: 0; text-align: right; color: var(--ink);
                  border: none; border-bottom: 1.5px solid #cbbc9c;
                  background: transparent; border-radius: 0; }
  #settle input:focus { outline: none; border-bottom-color: var(--red); }
  #settle .actions { margin: 18px 0 8px; }
  #s-go { background: var(--red); border-color: #8f1d17; color: var(--bone);
          box-shadow: 0 2px 0 #7c1812, 0 3px 6px rgba(0,0,0,.25); }
  #s-check { font-weight: bold; margin: 10px 0; }
  #s-check.ok { color: var(--pine); } #s-check.no { color: var(--red); }
  td.recv { color: var(--pine); font-weight: 700; }
  td.pay { color: var(--red); font-weight: 700; }
  button:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
  @media (max-width: 520px) {
    .tile { width: 38px; height: 52px; border-radius: 6px; }
    .tabs button { padding: 7px 13px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    button.tile:hover { transform: none; }
  }
</style>
</head>
<body>
<h1>川麻练习 <span class="seal">胡</span></h1>
<div class="tabs">
  <button id="tab-settle" class="active">结账</button>
  <button id="tab-ting">听牌练习</button>
  <button id="tab-discard">下叫练习</button>
</div>
<div class="tabs diff">
  <span class="hint">难度：</span>
  <button data-diff="easy">简单</button>
  <button data-diff="normal" class="active">普通</button>
  <button data-diff="hard">困难</button>
</div>
<div id="problem"></div>
<div id="settle" hidden>
  <div class="s-row"><label>人数</label><input id="s-count" type="number" min="2" max="8" value="4"></div>
  <div class="s-row"><label>起始筹码</label><input id="s-init" type="number" value="100"></div>
  <p class="hint">各家终局筹码：</p>
  <div id="s-players"></div>
  <div class="s-row"><label>茶钱筹码</label><input id="s-tea" type="number" value="0"></div>
  <div class="actions"><button id="s-go">结算</button></div>
  <div id="s-check"></div>
  <div id="s-out"></div>
</div>
<div class="actions" id="practice-actions">
  <button id="submit" hidden>提交</button>
  <button id="next">下一题</button>
</div>
<div id="verdict"></div>
<div id="result"></div>

<script src="majiang.js"></script>
<script>
"use strict";
const SUIT_NAMES = Majiang.SUIT_NAMES;
const fmt = Majiang.formatTile;
const $ = id => document.getElementById(id);

let mode = "settle";
let difficulty = "normal";
let problem = null;
let answered = false;
let discardPicks = [];

// 两个花色分成两行显示
function tileRows(tiles, build) {
  const wrap = document.createElement("div");
  const bySuit = {};
  tiles.forEach(t => (bySuit[t[1]] = bySuit[t[1]] || []).push(t));
  for (const s of "msp") {
    if (!bySuit[s]) continue;
    const row = document.createElement("div");
    row.className = "tile-row";
    bySuit[s].forEach(t => row.appendChild(build(t)));
    wrap.appendChild(row);
  }
  return wrap;
}

function tileSpan(t, tag = "span") {
  const el = document.createElement(tag);
  el.className = "tile " + t[1];
  el.title = fmt(t);
  el.innerHTML = `<img class="face" src="assets/tiles/${t[1]}${t[0]}.svg" alt="${fmt(t)}">`;
  el.dataset.tile = t;
  return el;
}

function loadProblem() {
  answered = false;
  discardPicks = [];
  $("verdict").textContent = "";
  $("verdict").className = "";
  $("result").innerHTML = "";
  problem = mode === "ting"
    ? Majiang.makeTingProblem(Math.random, difficulty)
    : Majiang.makeDiscardProblem(Math.random, difficulty);
  render();
}

function render() {
  const box = $("problem");
  box.innerHTML = "";
  if (mode === "ting") {
    box.insertAdjacentHTML("beforeend", '<p class="hint">手牌（已下叫）：</p>');
    const handDiv = document.createElement("div");
    problem.hand.forEach(t => handDiv.appendChild(tileSpan(t)));
    box.appendChild(handDiv);
    box.insertAdjacentHTML("beforeend", '<p class="hint">点选所有能胡的牌，然后提交：</p>');
    const cand = tileRows(problem.candidates, t => {
      const b = tileSpan(t, "button");
      b.onclick = () => { if (!answered) b.classList.toggle("selected"); };
      return b;
    });
    cand.id = "candidates";
    box.appendChild(cand);
    $("submit").hidden = false;
    $("submit").disabled = false;
  } else {
    box.insertAdjacentHTML("beforeend",
      `<p class="hint">定缺<b>${SUIT_NAMES[problem.missing_suit]}</b>，摸牌后 14 张。选出<b>所有</b>打出后能下叫的打法，每排点选一张：</p>`);
    const rows = document.createElement("div");
    rows.id = "rows";
    box.appendChild(rows);
    renderDiscardRows();
    $("submit").hidden = false;
    $("submit").disabled = false;
  }
}

// 已选 n 种打法就显示 n+1 排手牌，每排点选一张；点该排已选的牌取消整排，
// 点其他牌换选（与其他排重复的忽略）；判定后漏选的打法补成新排标黄
function renderDiscardRows() {
  const box = $("rows");
  box.innerHTML = "";
  const correct = answered ? new Set(problem.answer.best) : null;
  const rows = discardPicks.map(t => ({ pick: t, missed: false }));
  if (!answered) rows.push({ pick: null, missed: false });
  else Majiang.sortTiles(problem.answer.best.filter(t => !discardPicks.includes(t)))
    .forEach(t => rows.push({ pick: t, missed: true }));
  rows.forEach((r, i) => {
    const label = r.pick === null
      ? (i === 0 ? "点选一张打出后能下叫的牌：" : `第 ${i + 1} 种打法（点选一张，或直接提交）：`)
      : r.missed ? "漏选的打法：" : `第 ${i + 1} 种打法：`;
    box.insertAdjacentHTML("beforeend", `<p class="hint">${label}</p>`);
    const div = document.createElement("div");
    div.className = "d-row";
    let marked = false;
    problem.hand.forEach(t => {
      const b = tileSpan(t, "button");
      if (!marked && t === r.pick) {
        marked = true;
        if (!answered) b.classList.add("selected");
        else b.classList.add(r.missed ? "missed" : correct.has(t) ? "good" : "bad");
      }
      b.onclick = () => { if (!answered) pickInRow(i, t); };
      div.appendChild(b);
    });
    box.appendChild(div);
  });
}

function pickInRow(i, t) {
  if (i < discardPicks.length) {
    if (discardPicks[i] === t) discardPicks.splice(i, 1);
    else if (!discardPicks.includes(t)) discardPicks[i] = t;
  } else if (!discardPicks.includes(t)) {
    discardPicks.push(t);
  }
  renderDiscardRows();
}

function judgeTing() {
  answered = true;
  $("submit").disabled = true;
  const correct = new Set(problem.answer.hu_tiles.map(h => h.tile));
  const chosen = new Set(
    [...document.querySelectorAll("#candidates .selected")].map(b => b.dataset.tile));
  let ok = correct.size === chosen.size && [...correct].every(t => chosen.has(t));
  document.querySelectorAll("#candidates .tile").forEach(b => {
    const t = b.dataset.tile;
    if (correct.has(t) && chosen.has(t)) b.classList.add("good");
    else if (!correct.has(t) && chosen.has(t)) b.classList.add("bad");
    else if (correct.has(t)) b.classList.add("missed");
  });
  const v = $("verdict");
  v.textContent = ok ? "正确！" : "不对，看看漏了或多选了哪些。";
  v.className = ok ? "ok" : "no";
  const rows = problem.answer.hu_tiles.map(h =>
    `<tr><td>${fmt(h.tile)}</td><td>${h.fan} 倍</td><td>${h.patterns.join("、")}</td></tr>`).join("");
  $("result").innerHTML =
    `<table><tr><th>胡牌</th><th>倍数</th><th>番型</th></tr>${rows}</table>
     <p class="hint">倍数不含自摸、杠上花等加成。</p>`;
  v.scrollIntoView({ block: "nearest" });
}

function judgeDiscard() {
  answered = true;
  $("submit").disabled = true;
  const correct = new Set(problem.answer.best);
  const chosen = new Set(discardPicks);
  const ok = correct.size === chosen.size && [...correct].every(t => chosen.has(t));
  renderDiscardRows();
  const v = $("verdict");
  v.textContent = ok ? "正确！" : "不对，看看漏了或多选了哪些。";
  v.className = ok ? "ok" : "no";
  const rows = problem.answer.detail.map(d =>
    `<tr class="best"><td>打 ${fmt(d.tile)}</td>` +
    `<td>${d.waits.map(fmt).join(" ")}</td><td>${d.count} 枚</td></tr>`).join("");
  $("result").innerHTML =
    `<table><tr><th>下叫打法</th><th>听牌</th><th>枚数</th></tr>${rows}</table>
     <p class="hint">枚数按每种剩 4 张减去手中张数估算；打其他牌都不能下叫。</p>`;
  v.scrollIntoView({ block: "nearest" });
}

$("submit").onclick = () => {
  if (answered) return;
  if (mode === "ting") judgeTing();
  else if (mode === "discard") judgeDiscard();
};
$("next").onclick = () => {
  // 选了牌却没提交就点下一题：先判定，避免误以为没有反馈
  if (!answered && mode === "ting" && document.querySelector("#candidates .selected")) {
    judgeTing();
    return;
  }
  if (!answered && mode === "discard" && discardPicks.length > 0) {
    judgeDiscard();
    return;
  }
  loadProblem();
};
$("tab-ting").onclick = () => switchMode("ting");
$("tab-discard").onclick = () => switchMode("discard");
$("tab-settle").onclick = () => switchMode("settle");
document.querySelectorAll(".diff button").forEach(b => {
  b.onclick = () => {
    difficulty = b.dataset.diff;
    document.querySelectorAll(".diff button").forEach(x =>
      x.classList.toggle("active", x === b));
    loadProblem();
  };
});
function switchMode(m) {
  mode = m;
  $("tab-ting").classList.toggle("active", m === "ting");
  $("tab-discard").classList.toggle("active", m === "discard");
  $("tab-settle").classList.toggle("active", m === "settle");
  const isSettle = m === "settle";
  $("problem").hidden = isSettle;
  $("practice-actions").hidden = isSettle;
  document.querySelector(".tabs.diff").hidden = isSettle;
  $("settle").hidden = !isSettle;
  $("verdict").textContent = "";
  $("result").innerHTML = "";
  if (!isSettle) loadProblem();
}

// ---- 结账 ----
function money(x) { return String(Math.round(x * 100) / 100); }

// 人数变化时重建筹码输入行，保留已填的值
function buildPlayerRows(n) {
  const box = $("s-players");
  const old = [...box.querySelectorAll("input")].map(i => i.value);
  box.innerHTML = "";
  for (let i = 0; i < n; i++) {
    const row = document.createElement("div");
    row.className = "s-row";
    row.innerHTML = `<label>玩家${i + 1}</label><input class="s-chip" type="number">`;
    row.querySelector("input").value = old[i] !== undefined ? old[i] : "";
    box.appendChild(row);
  }
}
$("s-count").oninput = () => {
  const n = Number($("s-count").value);
  if (n >= 2 && n <= 8) buildPlayerRows(n);
};
buildPlayerRows(4);

$("s-go").onclick = () => {
  const init = Number($("s-init").value);
  const tea = Number($("s-tea").value);
  const chips = [...document.querySelectorAll("#s-players input")]
    .map(i => i.value.trim() === "" ? NaN : Number(i.value));
  const check = $("s-check");
  if (!isFinite(init) || !isFinite(tea) || chips.some(c => !isFinite(c))) {
    check.textContent = "请把所有数字填完整。";
    check.className = "no";
    $("s-out").innerHTML = "";
    return;
  }
  const n = chips.length;
  const r = Majiang.settle(init, chips, tea);
  if (r.diff === 0) {
    check.textContent = `对账正确：${n} 家筹码 + 茶钱 = ${init * n}。`;
    check.className = "ok";
  } else {
    const total = chips.reduce((a, b) => a + b, 0) + tea;
    check.textContent = `对不上：${n} 家筹码 + 茶钱 = ${total}，` +
      `应为 ${n} × ${init} = ${init * n}，差 ${money(Math.abs(r.diff))}，请核对。`;
    check.className = "no";
  }
  const rows = chips.map((c, i) => {
    const d = Math.round(r.deltas[i] * 100) / 100;
    const cls = d > 0 ? "recv" : d < 0 ? "pay" : "";
    const txt = d > 0 ? `收 ${money(d)} 元` : d < 0 ? `付 ${money(-d)} 元` : "不输不赢";
    return `<tr><td>玩家${i + 1}</td><td>${c}</td><td class="${cls}">${txt}</td></tr>`;
  }).join("");
  $("s-out").innerHTML =
    `<table><tr><th>玩家</th><th>终局筹码</th><th>输赢</th></tr>${rows}</table>
     <p class="hint">茶钱已按人数平分补回（每人 +${money(r.share)}）；茶钱现金另行结算。</p>`;
};

switchMode("settle");
</script>
</body>
</html>
