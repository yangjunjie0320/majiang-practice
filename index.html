<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>川麻练习</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🀄</text></svg>">
<style>
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         max-width: 720px; margin: 0 auto; padding: 16px; color: #222; }
  h1 { font-size: 1.3em; }
  [hidden] { display: none !important; }
  .tabs button { font-size: 1em; padding: 6px 16px; margin-right: 8px; cursor: pointer;
                 border: 1px solid #999; background: #fff; border-radius: 6px;
                 transition: background 0.15s; }
  .tabs button:hover { background: #eef1f4; }
  .tabs button.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
  .tabs.diff { margin-top: 8px; }
  .tabs.diff button { font-size: 0.9em; padding: 4px 12px; }
  .tile-row { margin: 3px 0; }
  .hint { color: #666; margin: 12px 0 6px; }
  .tile { display: inline-flex; justify-content: center; align-items: center;
          width: 46px; height: 62px; padding: 0;
          margin: 2px; border: 1px solid #b8b2a6; border-radius: 7px;
          background: linear-gradient(#fffef9, #f1ecdd);
          box-shadow: 0 2px 3px rgba(0,0,0,.18); user-select: none; }
  .tile .face { width: 90%; height: 90%; object-fit: contain; pointer-events: none; }
  button.tile { cursor: pointer; transition: transform 0.08s, box-shadow 0.08s; }
  button.tile:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,.22); }
  .tile.selected { outline: 3px solid #2c3e50; }
  .tile.good { background: #d4efdf; border-color: #27ae60; }
  .tile.bad { background: #fadbd8; border-color: #c0392b; }
  .tile.missed { background: #fcf3cf; border-color: #b7950b; }
  .melds { display: flex; align-items: center; gap: 12px; margin: 6px 0; flex-wrap: wrap; }
  .meld { display: inline-flex; align-items: center; background: #e8ecef;
          border-radius: 9px; padding: 2px 6px 2px 2px; }
  .meld .mtag { color: #555; font-size: 0.8em; margin: 0 6px 0 4px; }
  .actions { margin: 14px 0; }
  .actions button { font-size: 1em; padding: 8px 20px; cursor: pointer; border-radius: 6px;
                    border: 1px solid #2c3e50; background: #2c3e50; color: #fff; }
  .actions button:disabled { opacity: 0.4; cursor: default; }
  .actions #next { background: #fff; color: #2c3e50; }
  #verdict { font-size: 1.15em; }
  table { border-collapse: collapse; margin-top: 10px; font-size: 0.95em; }
  th, td { border: 1px solid #ccc; padding: 4px 10px; text-align: left; }
  tr.best { background: #d4efdf; }
  tr.worse td { color: #a0a0a0; }
  tr.chosen td:first-child::after { content: " ←你打的"; color: #666; font-size: 0.85em; }
  #verdict { font-weight: bold; margin: 10px 0; }
  #verdict.ok { color: #1e8449; } #verdict.no { color: #c0392b; }
  #settle input { font-size: 1em; width: 90px; padding: 4px 8px; margin: 2px 0;
                  border: 1px solid #999; border-radius: 6px; }
  .s-row { margin: 4px 0; }
  .s-row label { display: inline-block; width: 5em; color: #444; }
  #s-check { font-weight: bold; margin: 10px 0; }
  #s-check.ok { color: #1e8449; } #s-check.no { color: #c0392b; }
  .s-res { margin-left: 10px; }
  .s-res.recv { color: #1e8449; font-weight: bold; }
  .s-res.pay { color: #c0392b; font-weight: bold; }
  button:focus-visible, input:focus-visible { outline: 2px solid #2c3e50; outline-offset: 2px; }
  @media (max-width: 520px) {
    .tile { width: 38px; height: 52px; border-radius: 6px; }
    .tabs button { padding: 6px 13px; margin-right: 6px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    button.tile:hover { transform: none; }
  }
</style>
</head>
<body>
<h1>川麻练习</h1>
<div class="tabs">
  <button id="tab-settle" class="active">结账</button>
  <button id="tab-ting">听牌练习</button>
  <button id="tab-discard">下叫练习</button>
</div>
<div class="tabs diff">
  <span class="hint">难度：</span>
  <button data-diff="easy">简单</button>
  <button data-diff="normal" class="active">普通</button>
  <button data-diff="hard">困难</button>
</div>
<div id="problem"></div>
<div id="settle" hidden>
  <div class="s-row"><label>人数</label><input id="s-count" type="number" min="2" max="8" value="4"></div>
  <div class="s-row"><label>起始筹码</label><input id="s-init" type="number" value="100"></div>
  <p class="hint">各家终局筹码：</p>
  <div id="s-players"></div>
  <div class="s-row"><label>茶钱筹码</label><input id="s-tea" type="number" value="0"></div>
  <div class="actions"><button id="s-go">结算</button></div>
  <div id="s-check"></div>
  <div id="s-out"></div>
</div>
<div class="actions" id="practice-actions">
  <button id="submit" hidden>提交</button>
  <button id="next">下一题</button>
</div>
<div id="verdict"></div>
<div id="result"></div>

<script src="assets/pools.js"></script>
<script src="majiang.js"></script>
<script>
"use strict";
const SUIT_NAMES = Majiang.SUIT_NAMES;
const fmt = Majiang.formatTile;
const $ = id => document.getElementById(id);

let mode = "settle";
let difficulty = "normal";
let problem = null;
let answered = false;
let discardPicks = [];

// 两个花色分成两行显示
function tileRows(tiles, build) {
  const wrap = document.createElement("div");
  const bySuit = {};
  tiles.forEach(t => (bySuit[t[1]] = bySuit[t[1]] || []).push(t));
  for (const s of "msp") {
    if (!bySuit[s]) continue;
    const row = document.createElement("div");
    row.className = "tile-row";
    bySuit[s].forEach(t => row.appendChild(build(t)));
    wrap.appendChild(row);
  }
  return wrap;
}

function tileSpan(t, tag = "span") {
  const el = document.createElement(tag);
  el.className = "tile " + t[1];
  el.title = fmt(t);
  el.innerHTML = `<img class="face" src="assets/tiles/${t[1]}${t[0]}.svg" alt="${fmt(t)}">`;
  el.dataset.tile = t;
  return el;
}

// 副露区：单独一行，每组浅底色容器并标注 碰/明杠/暗杠；
// 练习是自己视角，暗杠不盖牌背，全部正面显示；span 不可点击
function meldsEl(melds) {
  const wrap = document.createElement("div");
  wrap.className = "melds";
  melds.forEach(meld => {
    const g = document.createElement("span");
    g.className = "meld";
    const name = meld.type === "peng" ? "碰" : meld.type === "gang" ? "明杠" : "暗杠";
    g.title = `${name} ${fmt(meld.tile)}`;
    const tag = document.createElement("span");
    tag.className = "mtag";
    tag.textContent = name;
    g.appendChild(tag);
    const n = meld.type === "peng" ? 3 : 4;
    for (let i = 0; i < n; i++) g.appendChild(tileSpan(meld.tile));
    wrap.appendChild(g);
  });
  return wrap;
}

function generateProblem(m, d) {
  return m === "ting"
    ? Majiang.makeTingProblem(Math.random, d)
    : Majiang.makeDiscardProblem(Math.random, d);
}

// 出完当前题就在后台把下一题先算好，点"下一题"零等待；
// 切换模式或难度后缓存对不上号，自然失效重新生成
let prefetch = null;
function schedulePrefetch() {
  const m = mode, d = difficulty;
  setTimeout(() => {
    if (mode === m && difficulty === d
        && !(prefetch && prefetch.mode === m && prefetch.difficulty === d)) {
      prefetch = { mode: m, difficulty: d, problem: generateProblem(m, d) };
    }
  }, 50);
}

function loadProblem() {
  answered = false;
  discardPicks = [];
  $("verdict").textContent = "";
  $("verdict").className = "";
  $("result").innerHTML = "";
  if (prefetch && prefetch.mode === mode && prefetch.difficulty === difficulty) {
    problem = prefetch.problem;
    prefetch = null;
  } else {
    problem = generateProblem(mode, difficulty);
  }
  render();
  schedulePrefetch();
}

function render() {
  const box = $("problem");
  box.innerHTML = "";
  if (mode === "ting") {
    box.insertAdjacentHTML("beforeend", '<p class="hint">手牌（已下叫）：</p>');
    const handDiv = document.createElement("div");
    problem.hand.forEach(t => handDiv.appendChild(tileSpan(t)));
    box.appendChild(handDiv);
    if (problem.melds.length > 0) box.appendChild(meldsEl(problem.melds));
    box.insertAdjacentHTML("beforeend", '<p class="hint">点选所有能胡的牌，然后提交：</p>');
    const cand = tileRows(problem.candidates, t => {
      const b = tileSpan(t, "button");
      b.onclick = () => { if (!answered) b.classList.toggle("selected"); };
      return b;
    });
    cand.id = "candidates";
    box.appendChild(cand);
    $("submit").hidden = false;
    $("submit").disabled = false;
  } else {
    const meldNote = problem.melds.length > 0 ? "（副露已亮出，不可打）" : "";
    box.insertAdjacentHTML("beforeend",
      `<p class="hint">定缺<b>${SUIT_NAMES[problem.missing_suit]}</b>。选出<b>所有</b>打出后能下叫的打法，每排点选一张${meldNote}：</p>`);
    if (problem.melds.length > 0) box.appendChild(meldsEl(problem.melds));
    const rows = document.createElement("div");
    rows.id = "rows";
    box.appendChild(rows);
    renderDiscardRows();
    $("submit").hidden = false;
    $("submit").disabled = false;
  }
}

// 已选 n 种打法就显示 n+1 排手牌，每排点选一张；点该排已选的牌取消整排，
// 点其他牌换选（与其他排重复的忽略）；判定后漏选的打法补成新排标黄
function renderDiscardRows() {
  const box = $("rows");
  box.innerHTML = "";
  const correct = answered ? new Set(problem.answer.best) : null;
  const rows = discardPicks.map(t => ({ pick: t, missed: false }));
  if (!answered) rows.push({ pick: null, missed: false });
  else Majiang.sortTiles(problem.answer.best.filter(t => !discardPicks.includes(t)))
    .forEach(t => rows.push({ pick: t, missed: true }));
  rows.forEach((r, i) => {
    const label = r.pick === null
      ? (i === 0 ? "点选一张打出后能下叫的牌：" : `第 ${i + 1} 种打法（点选一张，或直接提交）：`)
      : r.missed ? "漏选的打法：" : `第 ${i + 1} 种打法：`;
    box.insertAdjacentHTML("beforeend", `<p class="hint">${label}</p>`);
    const div = document.createElement("div");
    div.className = "d-row";
    let marked = false;
    problem.hand.forEach(t => {
      const b = tileSpan(t, "button");
      if (!marked && t === r.pick) {
        marked = true;
        if (!answered) b.classList.add("selected");
        else b.classList.add(r.missed ? "missed" : correct.has(t) ? "good" : "bad");
      }
      b.onclick = () => { if (!answered) pickInRow(i, t); };
      div.appendChild(b);
    });
    box.appendChild(div);
  });
}

function pickInRow(i, t) {
  if (i < discardPicks.length) {
    if (discardPicks[i] === t) discardPicks.splice(i, 1);
    else if (!discardPicks.includes(t)) discardPicks[i] = t;
  } else if (!discardPicks.includes(t)) {
    discardPicks.push(t);
  }
  renderDiscardRows();
}

function judgeTing() {
  answered = true;
  $("submit").disabled = true;
  const correct = new Set(problem.answer.hu_tiles.map(h => h.tile));
  const chosen = new Set(
    [...document.querySelectorAll("#candidates .selected")].map(b => b.dataset.tile));
  let ok = correct.size === chosen.size && [...correct].every(t => chosen.has(t));
  document.querySelectorAll("#candidates .tile").forEach(b => {
    const t = b.dataset.tile;
    if (correct.has(t) && chosen.has(t)) b.classList.add("good");
    else if (!correct.has(t) && chosen.has(t)) b.classList.add("bad");
    else if (correct.has(t)) b.classList.add("missed");
  });
  const v = $("verdict");
  v.textContent = ok ? "正确！" : "不对，看看漏了或多选了哪些。";
  v.className = ok ? "ok" : "no";
  const rows = problem.answer.hu_tiles.map(h =>
    `<tr><td>${fmt(h.tile)}</td><td>${h.fan} 倍</td><td>${h.patterns.join("、")}</td></tr>`).join("");
  $("result").innerHTML =
    `<table><tr><th>胡牌</th><th>倍数</th><th>番型</th></tr>${rows}</table>
     <p class="hint">倍数不含自摸、杠上花等加成。</p>`;
  v.scrollIntoView({ block: "nearest" });
}

function judgeDiscard() {
  answered = true;
  $("submit").disabled = true;
  const correct = new Set(problem.answer.best);
  const chosen = new Set(discardPicks);
  const ok = correct.size === chosen.size && [...correct].every(t => chosen.has(t));
  renderDiscardRows();
  const v = $("verdict");
  v.textContent = ok ? "正确！" : "不对，看看漏了或多选了哪些。";
  v.className = ok ? "ok" : "no";
  const rows = problem.answer.detail.map(d =>
    `<tr class="best"><td>打 ${fmt(d.tile)}</td>` +
    `<td>${d.waits.map(fmt).join(" ")}</td></tr>`).join("");
  $("result").innerHTML =
    `<table><tr><th>下叫打法</th><th>听牌</th></tr>${rows}</table>
     <p class="hint">打其他牌都不能下叫。</p>`;
  v.scrollIntoView({ block: "nearest" });
}

$("submit").onclick = () => {
  if (answered) return;
  if (mode === "ting") judgeTing();
  else if (mode === "discard") judgeDiscard();
};
$("next").onclick = () => {
  // 选了牌却没提交就点下一题：先判定，避免误以为没有反馈
  if (!answered && mode === "ting" && document.querySelector("#candidates .selected")) {
    judgeTing();
    return;
  }
  if (!answered && mode === "discard" && discardPicks.length > 0) {
    judgeDiscard();
    return;
  }
  loadProblem();
};
$("tab-ting").onclick = () => switchMode("ting");
$("tab-discard").onclick = () => switchMode("discard");
$("tab-settle").onclick = () => switchMode("settle");
document.querySelectorAll(".diff button").forEach(b => {
  b.onclick = () => {
    difficulty = b.dataset.diff;
    document.querySelectorAll(".diff button").forEach(x =>
      x.classList.toggle("active", x === b));
    loadProblem();
  };
});
function switchMode(m) {
  mode = m;
  $("tab-ting").classList.toggle("active", m === "ting");
  $("tab-discard").classList.toggle("active", m === "discard");
  $("tab-settle").classList.toggle("active", m === "settle");
  const isSettle = m === "settle";
  $("problem").hidden = isSettle;
  $("practice-actions").hidden = isSettle;
  document.querySelector(".tabs.diff").hidden = isSettle;
  $("settle").hidden = !isSettle;
  $("verdict").textContent = "";
  $("result").innerHTML = "";
  if (!isSettle) loadProblem();
}

// ---- 结账 ----
function money(x) { return String(Math.round(x * 100) / 100); }

// 人数变化时重建筹码输入行，保留已填的值；结果显示在每行右侧
function buildPlayerRows(n) {
  const box = $("s-players");
  const old = [...box.querySelectorAll("input")].map(i => i.value);
  box.innerHTML = "";
  for (let i = 0; i < n; i++) {
    const row = document.createElement("div");
    row.className = "s-row";
    row.innerHTML =
      `<label>玩家${i + 1}</label><input class="s-chip" type="number"><span class="s-res"></span>`;
    row.querySelector("input").value = old[i] !== undefined ? old[i] : "";
    box.appendChild(row);
  }
}
buildPlayerRows(4);

// 任何输入变化都清掉上次结算结果，避免显示过期数字
function clearSettleResults() {
  $("s-check").textContent = "";
  $("s-check").className = "";
  $("s-out").innerHTML = "";
  document.querySelectorAll("#s-players .s-res").forEach(e => {
    e.textContent = "";
    e.className = "s-res";
  });
}
$("settle").addEventListener("input", e => {
  if (e.target.id === "s-count") {
    const n = Number(e.target.value);
    if (Number.isInteger(n) && n >= 2 && n <= 8) buildPlayerRows(n);
  }
  clearSettleResults();
});

$("s-go").onclick = () => {
  clearSettleResults();
  const check = $("s-check");
  const fail = msg => { check.textContent = msg; check.className = "no"; };
  const cnt = Number($("s-count").value);
  if (!Number.isInteger(cnt) || cnt < 2 || cnt > 8) return fail("人数需为 2-8 的整数。");
  const init = $("s-init").value.trim() === "" ? NaN : Number($("s-init").value);
  if (!Number.isInteger(init) || init <= 0) return fail("起始筹码需为正整数。");
  const chips = [...document.querySelectorAll("#s-players input")]
    .map(i => i.value.trim() === "" ? NaN : Number(i.value));
  if (chips.some(c => !Number.isInteger(c) || c < 0))
    return fail("每家终局筹码需为非负整数，请填完整。");
  const tea = $("s-tea").value.trim() === "" ? NaN : Number($("s-tea").value);
  if (!Number.isInteger(tea) || tea < 0) return fail("茶钱需为非负整数。");

  const n = chips.length;
  const r = Majiang.settle(init, chips, tea);
  if (r.diff !== 0) {
    const total = chips.reduce((a, b) => a + b, 0) + tea;
    return fail(`对不上：${n} 家筹码 + 茶钱 = ${total}，` +
      `应为 ${n} × ${init} = ${init * n}，差 ${money(Math.abs(r.diff))}，请核对后再结算。`);
  }
  check.textContent = `对账正确：${n} 家筹码 + 茶钱 = ${init * n}。`;
  check.className = "ok";
  document.querySelectorAll("#s-players .s-res").forEach((e, i) => {
    const d = Math.round(r.deltas[i] * 100) / 100;
    e.className = "s-res " + (d > 0 ? "recv" : d < 0 ? "pay" : "");
    e.textContent = d > 0 ? `收 ${money(d)} 元` : d < 0 ? `付 ${money(-d)} 元` : "不输不赢";
  });
  $("s-out").innerHTML =
    `<p class="hint">茶钱已按人数平分补回（每人 +${money(r.share)}）；茶钱现金另行结算。</p>`;
};

switchMode("settle");
</script>
</body>
</html>
